<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Task Board</h1>
        <div id="task-counter" class="badge">Total Tasks: 0</div>
        
        <div class="filter-section">
            <label for="priorityFilter">Filter by Priority:</label>
            <select id="priorityFilter">
                <option value="all">All Priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
    </header>

    <main class="board">
        <section id="todo" class="column">
            <h2>To Do</h2>
            <ul id="todo-list" class="task-list"></ul>
            <button class="add-task-btn" data-column="todo">+ Add Task</button>
        </section>

        <section id="inprogress" class="column">
            <h2>In Progress</h2>
            <ul id="inprogress-list" class="task-list"></ul>
            <button class="add-task-btn" data-column="inprogress">+ Add Task</button>
        </section>

        <section id="done" class="column">
            <h2>Done</h2>
            <ul id="done-list" class="task-list"></ul>
            <button class="add-task-btn" data-column="done">+ Add Task</button>
            <button id="clear-done-btn">Clear All Done</button>
        </section>
    </main>

    <div id="taskModal" class="modal is-hidden">
        <div class="modal-content">
            <h3 id="modalTitle">Add New Task</h3>
            <input type="text" id="taskTitleInput" placeholder="Task Title">
            <textarea id="taskDescInput" placeholder="Description"></textarea>
            <select id="taskPriorityInput">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <input type="date" id="taskDateInput">
            <div class="modal-actions">
                <button id="saveTaskBtn">Save Task</button>
                <button id="cancelModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
